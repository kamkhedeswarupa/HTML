<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <form action="#" method="post">
        <h1>Student Admission Form</h1>
        <label for="Name"><b>Student Name :-</b></label>
        <input type="text" name="Name" placeholder="Enter your Name">
        <br><br>
        <label for="Fname"><b>Father's Name :-</b></label>
        <input type="text" name="Fname" placeholder="Enter your father's name">
        <br><br>
        <label for="Mname"><b>Mother's Name :-</b></label>
        <input type="text" name="Mname" placeholder="Enter your mother's name">
        <br><br>
        <label for="Email"><b>Email :-</b></label>
        <input type="email" name="Email" placeholder="Enter your email">
        <br><br>
        <label for="tel"><b>Mobile Number:-</b></label>
        <input type="tel" name="Mobile Number" placeholder="Enter your mobile number">
        <br><br>
        <label><b>Gender :-</b></label>
        <input type="radio" name="gender">male
        <input type="radio" name="gender">female
        <br><br>
       <label><b>Date of Birth :-</b></label>

        <select name="Day">
            option>1</option>
            <option>2</option>  
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>  
            <option>9</option>
            <option>10</option>
        
        </select>
        <select name="Month">
            <option>January</option>
            <option>February</option>  
            <option>March</option>
            <option>April</option>
            <option>May</option>
            <option>June</option>
            <option>July</option>
            <option>August</option>
            <option>September</option>
            <option>October</option>
            <option>November</option>
            <option>December</option>
        </select>
        <select name="Year">
            <option>2000</option>
            <option>2001</option>  
            <option>2002</option>
            <option>2003</option>
            <option>2004</option>
            <option>2005</option>
        </select>
        <br><br>
        
        <label><b>Course :-</b></label>
        <select name="Course">
            <option>Computer Engg</option>
            <option>Mechanical Engg</option>
            <option>Civil Engg</option>     
            <option>Electrical Engg</option>
            <option>Electronics Engg</option>
            <option>Information Technology</option>
        </select>
        <br><br>
        <label><b>Address :-</b></label><br>
        <textarea rows="5" cols="40" 
        placeholder="Enter your Address"></textarea>
         <br><br>  
         <label><b>Hobbies :-</b></label>
         <input type="checkbox">Reading
         <input type="checkbox">Sports
         <input type="checkbox">music
         <br><br>
         <label><b>Upload Photo :-</b></label>
        <input type="file" name="photo">
        <br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
