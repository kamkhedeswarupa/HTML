<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG in html</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Animated Blob 1 -->
  <circle cx="300" cy="250" r="180"
          fill="#06b6d4"
          opacity="0.5"
          filter="url(#blur)">
    <animate attributeName="cx"
             values="300;500;300"
             dur="12s"
             repeatCount="indefinite"/>
    <animate attributeName="cy"
             values="250;450;250"
             dur="10s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Animated Blob 2 -->
  <circle cx="1200" cy="300" r="220"
          fill="#ec4899"
          opacity="0.4"
          filter="url(#blur)">
    <animate attributeName="cx"
             values="1200;900;1200"
             dur="16s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Animated Blob 3 -->
  <circle cx="800" cy="700" r="200"
          fill="#8b5cf6"
          opacity="0.4"
          filter="url(#blur)">
    <animate attributeName="cy"
             values="700;500;700"
             dur="14s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Floating Stars -->
  <g fill="white">
    <circle cx="200" cy="200" r="2">
      <animate attributeName="opacity"
               values="0.2;1;0.2"
               dur="3s"
               repeatCount="indefinite"/>
    </circle>

    <circle cx="500" cy="150" r="2">
      <animate attributeName="opacity"
               values="1;0.2;1"
               dur="4s"
               repeatCount="indefinite"/>
    </circle>

    <circle cx="900" cy="250" r="2">
      <animate attributeName="opacity"
               values="0.2;1;0.2"
               dur="5s"
               repeatCount="indefinite"/>
    </circle>

    <circle cx="1300" cy="180" r="2">
      <animate attributeName="opacity"
               values="1;0.2;1"
               dur="6s"
               repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
</body>
</html>
